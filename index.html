<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WakeForce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --bg2: #0f0f0f;
    --bg3: #161616;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --glass-hover: rgba(255,255,255,0.07);
    --text: #ffffff;
    --text2: #aaaaaa;
    --text3: #555555;
    --accent: #ffffff;
    --accent-dim: rgba(255,255,255,0.15);
    --glow: 0 0 30px rgba(255,255,255,0.08);
    --glow-strong: 0 0 60px rgba(255,255,255,0.15);
    --danger: #ff4444;
    --success: #44ff88;
    --warn: #ffaa44;
    --nav-h: 72px;
    --radius: 20px;
    --radius-sm: 12px;
  }
  .light-mode {
    --bg: #f0f0f0;
    --bg2: #e8e8e8;
    --bg3: #ffffff;
    --glass: rgba(0,0,0,0.04);
    --glass-border: rgba(0,0,0,0.08);
    --glass-hover: rgba(0,0,0,0.07);
    --text: #0a0a0a;
    --text2: #555555;
    --text3: #aaaaaa;
    --accent: #0a0a0a;
    --accent-dim: rgba(0,0,0,0.12);
    --glow: 0 4px 30px rgba(0,0,0,0.08);
    --glow-strong: 0 4px 60px rgba(0,0,0,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:var(--bg); color:var(--text);
    font-family:'Space Grotesk', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity:.4;
  }
  #app { position:relative; z-index:1; width:100%; height:100%; display:flex; flex-direction:column; }

  /* SCREENS */
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity .35s ease, transform .35s ease; transform:translateY(16px); }
  .screen.active { opacity:1; pointer-events:all; transform:translateY(0); }
  .screen-content { flex:1; overflow-y:auto; padding:24px 20px calc(var(--nav-h) + 24px); scroll-behavior:smooth; }
  .screen-content::-webkit-scrollbar { display:none; }

  /* NAV */
  #nav {
    position:fixed; bottom:0; left:0; right:0; z-index:100;
    height:var(--nav-h); display:flex; align-items:center; justify-content:space-around;
    background:rgba(8,8,8,0.85); backdrop-filter:blur(24px) saturate(180%);
    border-top:1px solid var(--glass-border);
    padding-bottom:env(safe-area-inset-bottom, 0);
    transition:background .3s;
  }
  .light-mode #nav { background:rgba(240,240,240,0.85); }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 16px; cursor:pointer; border:none; background:none; color:var(--text3); transition:color .2s, transform .15s; }
  .nav-btn.active { color:var(--text); }
  .nav-btn:active { transform:scale(.9); }
  .nav-icon { font-size:20px; line-height:1; }
  .nav-label { font-size:10px; font-weight:500; letter-spacing:.05em; text-transform:uppercase; font-family:'Space Grotesk', sans-serif; }
  .nav-dot { width:4px; height:4px; border-radius:50%; background:var(--text); opacity:0; transition:opacity .2s; }
  .nav-btn.active .nav-dot { opacity:1; }

  /* GLASS CARD */
  .card {
    background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius);
    backdrop-filter:blur(12px); padding:20px; transition:all .2s;
    box-shadow:var(--glow);
  }
  .card:active { transform:scale(.99); background:var(--glass-hover); }

  /* TYPOGRAPHY */
  .label { font-size:11px; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); }
  .title { font-size:28px; font-weight:700; letter-spacing:-.02em; }
  .subtitle { font-size:15px; color:var(--text2); font-weight:400; }
  .mono { font-family:'JetBrains Mono', monospace; }

  /* BUTTONS */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 24px; border-radius:var(--radius-sm); border:none; cursor:pointer;
    font-family:'Space Grotesk', sans-serif; font-size:15px; font-weight:600; letter-spacing:.02em;
    transition:all .2s cubic-bezier(.34,1.56,.64,1); position:relative; overflow:hidden;
  }
  .btn::after { content:''; position:absolute; inset:0; background:white; opacity:0; transition:opacity .15s; }
  .btn:active::after { opacity:.08; }
  .btn:active { transform:scale(.97); }
  .btn-primary { background:var(--text); color:var(--bg); box-shadow:0 4px 24px rgba(255,255,255,0.12); }
  .btn-primary:hover { box-shadow:0 4px 40px rgba(255,255,255,0.2); transform:scale(1.02); }
  .btn-ghost { background:var(--glass); border:1px solid var(--glass-border); color:var(--text); }
  .btn-ghost:hover { background:var(--glass-hover); }
  .btn-danger { background:rgba(255,68,68,0.15); border:1px solid rgba(255,68,68,0.3); color:var(--danger); }
  .btn-full { width:100%; }

  /* HOME SCREEN */
  .clock-wrap { text-align:center; padding:32px 0 24px; }
  .clock-display {
    font-family:'JetBrains Mono', monospace; font-size:clamp(64px, 18vw, 88px);
    font-weight:300; letter-spacing:-.04em; line-height:1;
    text-shadow:0 0 80px rgba(255,255,255,0.1);
    display:flex; align-items:center; justify-content:center; gap:2px;
  }
  .clock-digit { display:inline-block; transition:transform .1s ease; }
  .clock-digit.flip { animation:flip .15s ease; }
  @keyframes flip { 0%{transform:translateY(-4px) scale(.95)} 50%{opacity:.6} 100%{transform:translateY(0) scale(1)} }
  .clock-sep { opacity:.3; animation:blink 1s step-end infinite; }
  @keyframes blink { 50%{opacity:0} }
  .clock-date { font-size:14px; color:var(--text2); letter-spacing:.08em; margin-top:8px; font-weight:400; }

  .streak-pill {
    display:inline-flex; align-items:center; gap:6px;
    background:var(--glass); border:1px solid var(--glass-border);
    border-radius:100px; padding:6px 14px; font-size:13px; font-weight:600;
    margin:0 auto; cursor:pointer;
  }

  .alarm-list { display:flex; flex-direction:column; gap:10px; }
  .alarm-item {
    display:flex; align-items:center; justify-content:space-between;
    background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius-sm);
    padding:14px 18px; transition:all .2s;
  }
  .alarm-item.active-alarm { border-color:rgba(255,255,255,0.2); box-shadow:0 0 20px rgba(255,255,255,0.05); }
  .alarm-time-big { font-family:'JetBrains Mono', monospace; font-size:28px; font-weight:400; }
  .alarm-meta { font-size:12px; color:var(--text3); margin-top:2px; }

  /* TOGGLE SWITCH */
  .toggle { position:relative; width:44px; height:26px; flex-shrink:0; }
  .toggle input { opacity:0; width:0; height:0; position:absolute; }
  .toggle-track {
    position:absolute; inset:0; border-radius:100px;
    background:var(--glass-border); transition:all .25s; cursor:pointer; border:1px solid var(--glass-border);
  }
  .toggle input:checked + .toggle-track { background:var(--text); }
  .toggle-thumb {
    position:absolute; top:3px; left:3px; width:18px; height:18px;
    background:var(--bg); border-radius:50%; transition:transform .25s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;
  }
  .toggle input:checked ~ .toggle-thumb { transform:translateX(18px); background:var(--bg); }

  /* SET ALARM SCREEN */
  .time-picker-wrap { text-align:center; padding:20px 0; }
  .time-picker {
    display:inline-flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono', monospace; font-size:clamp(52px,14vw,72px); font-weight:300;
  }
  .tp-col { display:flex; flex-direction:column; align-items:center; gap:0; }
  .tp-digit {
    width:clamp(56px,14vw,80px); height:clamp(52px,14vw,72px);
    display:flex; align-items:center; justify-content:center;
    background:var(--glass); border:1px solid var(--glass-border);
    border-radius:var(--radius-sm); transition:all .15s; cursor:pointer; user-select:none;
    position:relative; overflow:hidden;
  }
  .tp-digit:active { background:var(--glass-hover); transform:scale(.96); }
  .tp-btn { background:none; border:none; color:var(--text3); font-size:22px; padding:4px 12px; cursor:pointer; transition:color .15s, transform .1s; }
  .tp-btn:active { color:var(--text); transform:scale(.9); }
  .tp-sep { font-size:clamp(40px,10vw,56px); opacity:.3; align-self:center; padding:0 4px; }

  .option-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .option-btn {
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    padding:16px 12px; border-radius:var(--radius-sm); border:1px solid var(--glass-border);
    background:var(--glass); cursor:pointer; transition:all .2s; text-align:center;
    font-family:'Space Grotesk', sans-serif;
  }
  .option-btn.selected { border-color:var(--text); background:var(--accent-dim); box-shadow:var(--glow); }
  .option-btn:active { transform:scale(.96); }
  .option-icon { font-size:22px; }
  .option-label { font-size:13px; font-weight:600; color:var(--text); }
  .option-desc { font-size:11px; color:var(--text3); }

  .difficulty-wrap { padding:8px 0; }
  .diff-slider { -webkit-appearance:none; appearance:none; width:100%; height:4px; border-radius:2px; background:var(--glass-border); outline:none; }
  .diff-slider::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--text); cursor:pointer; box-shadow:0 0 16px rgba(255,255,255,0.2); transition:transform .15s; }
  .diff-slider::-webkit-slider-thumb:active { transform:scale(1.3); }
  .diff-labels { display:flex; justify-content:space-between; margin-top:8px; }
  .diff-label-item { font-size:11px; color:var(--text3); }

  .tone-list { display:flex; flex-direction:column; gap:8px; }
  .tone-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; border-radius:var(--radius-sm); border:1px solid var(--glass-border);
    background:var(--glass); cursor:pointer; transition:all .2s;
  }
  .tone-item.selected { border-color:var(--text); background:var(--accent-dim); }
  .tone-item:active { transform:scale(.98); }

  /* PROGRESS SCREEN */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-card { background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:16px; }
  .stat-val { font-family:'JetBrains Mono', monospace; font-size:32px; font-weight:400; }
  .stat-lbl { font-size:11px; color:var(--text3); margin-top:4px; text-transform:uppercase; letter-spacing:.08em; }

  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-day {
    aspect-ratio:1; border-radius:6px; background:var(--glass); border:1px solid var(--glass-border);
    display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text3);
    transition:all .2s;
  }
  .cal-day.done { background:var(--text); color:var(--bg); border-color:transparent; }
  .cal-day.today { border-color:var(--text); }
  .cal-day.miss { background:rgba(255,68,68,0.1); border-color:rgba(255,68,68,0.2); }

  .badge-list { display:flex; flex-wrap:wrap; gap:10px; }
  .badge {
    display:flex; align-items:center; gap:8px; padding:10px 14px;
    background:var(--glass); border:1px solid var(--glass-border); border-radius:100px;
    font-size:13px; font-weight:500; transition:all .2s;
  }
  .badge.earned { border-color:rgba(255,255,255,0.25); box-shadow:0 0 16px rgba(255,255,255,0.06); }
  .badge.locked { opacity:.35; }

  .chart-bars { display:flex; align-items:flex-end; gap:4px; height:80px; }
  .chart-bar { flex:1; border-radius:4px 4px 0 0; background:var(--glass-border); transition:height .4s ease; position:relative; min-height:4px; }
  .chart-bar.filled { background:var(--text); opacity:.7; }

  /* SETTINGS SCREEN */
  .setting-row {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 0; border-bottom:1px solid var(--glass-border);
  }
  .setting-row:last-child { border-bottom:none; }

  /* ALARM TRIGGER SCREEN */
  #alarm-screen {
    position:fixed; inset:0; z-index:1000; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:var(--bg);
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  #alarm-screen.visible { opacity:1; pointer-events:all; }
  .alarm-pulse-bg {
    position:absolute; inset:0; z-index:0;
    animation:alarm-pulse 1.2s ease-in-out infinite;
  }
  @keyframes alarm-pulse {
    0%,100%{background:rgba(0,0,0,0)}
    50%{background:rgba(255,68,68,0.06)}
  }
  .alarm-content { position:relative; z-index:1; text-align:center; padding:32px 24px; width:100%; max-width:440px; }
  .wake-text {
    font-family:'JetBrains Mono', monospace; font-size:clamp(40px,12vw,64px);
    font-weight:700; letter-spacing:.15em; text-transform:uppercase;
    animation:wake-glow 1.2s ease-in-out infinite;
  }
  @keyframes wake-glow {
    0%,100%{opacity:1;text-shadow:0 0 40px rgba(255,255,255,0.3)}
    50%{opacity:.7;text-shadow:0 0 80px rgba(255,255,255,0.1)}
  }
  .alarm-trigger-time { font-family:'JetBrains Mono', monospace; font-size:48px; font-weight:300; opacity:.5; margin-top:4px; }

  /* TASK UI */
  .task-container {
    background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius);
    padding:24px; margin-top:24px; backdrop-filter:blur(12px);
  }
  .task-progress-bar {
    height:4px; background:var(--glass-border); border-radius:2px; overflow:hidden; margin-bottom:20px;
  }
  .task-progress-fill { height:100%; background:var(--text); border-radius:2px; transition:width .3s ease; width:0%; }

  .math-eq { font-family:'JetBrains Mono', monospace; font-size:36px; font-weight:400; text-align:center; margin:16px 0; }
  .task-input {
    width:100%; background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--radius-sm);
    padding:14px 18px; font-family:'JetBrains Mono', monospace; font-size:24px; text-align:center;
    color:var(--text); outline:none; transition:border-color .2s;
  }
  .task-input:focus { border-color:var(--text); }
  .task-input.wrong { border-color:var(--danger); animation:shake .4s ease; }
  .task-input.right { border-color:var(--success); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }

  .shake-meter { position:relative; margin:20px 0; }
  .shake-circle {
    width:120px; height:120px; border-radius:50%; margin:0 auto;
    border:2px solid var(--glass-border); display:flex; align-items:center; justify-content:center;
    font-family:'JetBrains Mono', monospace; font-size:28px; font-weight:400;
    transition:border-color .2s, box-shadow .2s;
  }
  .shake-circle.shaking { border-color:var(--text); box-shadow:0 0 40px rgba(255,255,255,0.15); animation:shake-pulse .2s ease infinite; }
  @keyframes shake-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  .memory-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:16px 0; }
  .mem-cell {
    aspect-ratio:1; border-radius:10px; background:var(--glass); border:1px solid var(--glass-border);
    display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer;
    transition:all .2s; user-select:none;
  }
  .mem-cell.highlight { background:var(--text); border-color:transparent; transform:scale(1.05); }
  .mem-cell.correct { background:rgba(68,255,136,0.2); border-color:rgba(68,255,136,0.4); }
  .mem-cell.wrong-cell { background:rgba(255,68,68,0.2); border-color:rgba(255,68,68,0.4); animation:shake .3s ease; }
  .mem-cell:active { transform:scale(.92); }

  .success-overlay {
    position:absolute; inset:0; z-index:10; display:flex; flex-direction:column;
    align-items:center; justify-content:center; background:var(--bg);
    opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .success-overlay.show { opacity:1; pointer-events:all; }
  .success-ring {
    width:120px; height:120px; border-radius:50%; border:2px solid var(--success);
    display:flex; align-items:center; justify-content:center; font-size:48px;
    animation:success-pop .4s cubic-bezier(.34,1.56,.64,1) forwards;
    box-shadow:0 0 60px rgba(68,255,136,0.2);
  }
  @keyframes success-pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }

  /* UTILITY */
  .gap-sm { height:10px; }
  .gap-md { height:16px; }
  .gap-lg { height:24px; }
  .section-title { font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:10px; }
  .row { display:flex; align-items:center; justify-content:space-between; }
  .col { display:flex; flex-direction:column; }
  .empty-state { text-align:center; padding:40px 24px; color:var(--text3); }
  .empty-icon { font-size:40px; margin-bottom:12px; opacity:.4; }

  /* SNACKBAR */
  #snackbar {
    position:fixed; bottom:calc(var(--nav-h) + 16px); left:50%; transform:translateX(-50%) translateY(16px);
    background:var(--text); color:var(--bg); padding:12px 24px; border-radius:100px;
    font-size:14px; font-weight:600; z-index:500; opacity:0; transition:all .25s; white-space:nowrap;
  }
  #snackbar.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* SCROLLBAR */
  * { scrollbar-width:none; }

  .fade-in { animation:fadeIn .4s ease forwards; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .section { margin-bottom:24px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="screen-content">
      <div class="clock-wrap fade-in">
        <div class="clock-display">
          <span class="clock-digit mono" id="ch1">0</span><span class="clock-digit mono" id="ch2">0</span>
          <span class="clock-sep mono">:</span>
          <span class="clock-digit mono" id="cm1">0</span><span class="clock-digit mono" id="cm2">0</span>
          <span class="clock-sep mono">:</span>
          <span class="clock-digit mono" id="cs1">0</span><span class="clock-digit mono" id="cs2">0</span>
        </div>
        <div class="clock-date" id="clock-date"></div>
        <div class="gap-sm"></div>
        <div class="streak-pill">🔥 <span id="streak-count">0</span> day streak</div>
      </div>

      <div class="section fade-in" style="animation-delay:.1s">
        <div class="row section-title" style="margin-bottom:12px">
          <span>Alarms</span>
          <span id="alarm-count" style="color:var(--text2)">0 active</span>
        </div>
        <div class="alarm-list" id="alarm-list">
          <div class="empty-state"><div class="empty-icon">⏰</div><div>No alarms set</div><div style="font-size:12px;margin-top:4px">Tap + to create one</div></div>
        </div>
      </div>

      <div class="gap-sm"></div>
      <button class="btn btn-primary btn-full" onclick="navTo('set')" style="animation-delay:.2s">
        <span>+</span> Set New Alarm
      </button>
    </div>
  </div>

  <!-- SET ALARM SCREEN -->
  <div class="screen" id="screen-set">
    <div class="screen-content">
      <div class="gap-md"></div>
      <div class="time-picker-wrap">
        <div class="time-picker">
          <div class="tp-col">
            <button class="tp-btn" onclick="adjustTP('h',1)">▲</button>
            <div class="tp-digit mono" id="tp-h" onclick="focusTP('h')">07</div>
            <b
